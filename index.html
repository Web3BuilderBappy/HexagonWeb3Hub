<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e4f0;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-card {
            max-width: 380px;
            margin: 100px auto;
            background: #0f1629;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #f0b90b;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1f33;
            border: 1px solid #2a3555;
            border-radius: 10px;
            color: white;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f0b90b, #d49a08);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .card {
            background: #0f1629;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2a44;
        }
        .card h3 { margin-bottom: 16px; color: #f0b90b; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1a1f33;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: bold; }
        .control-group { margin-bottom: 16px; }
        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #8a92b0;
        }
        .control-group input, .control-group select {
            width: 100%;
            padding: 10px;
            background: #1a1f33;
            border: 1px solid #2a3555;
            border-radius: 10px;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #f0b90b, #d49a08);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-danger { background: linear-gradient(135deg, #ff3b30, #cc2f25); color: white; }
        .btn-success { background: linear-gradient(135deg, #00c853, #009624); color: white; }
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #1f2a44;
        }
        .preview {
            background: #1a1f33;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-top: 16px;
        }
        .preview-price { font-size: 36px; font-weight: bold; font-family: monospace; }
        canvas {
            width: 100%;
            height: 200px;
            background: #0d1224;
            border-radius: 12px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-card">
        <h2 style="text-align: center; margin-bottom: 20px;">🔐 Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="adminLogin()">Login</button>
        <div id="loginErr" style="color: #ff3b30; margin-top: 10px; text-align: center;"></div>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>⚙️ Binary Admin Panel</h1>
                <button onclick="adminLogout()">Logout</button>
            </div>

            <div class="stats">
                <div class="stat-box"><div>Current Price</div><div class="stat-value" id="adminPrice">—</div></div>
                <div class="stat-box"><div>24h Change</div><div class="stat-value" id="adminChange">—</div></div>
                <div class="stat-box"><div>Status</div><div class="stat-value" id="adminStatus">—</div></div>
            </div>

            <div class="card">
                <h3>🎮 Market Control</h3>
                <div class="control-group">
                    <label>Market Status</label>
                    <select id="marketStatus">
                        <option value="false">🔒 Closed</option>
                        <option value="true">🟢 Open</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Direction</label>
                    <select id="marketDir">
                        <option value="1">📈 UP</option>
                        <option value="-1">📉 DOWN</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Speed (0.5 - 10)</label>
                    <input type="range" id="marketSpeed" min="0.5" max="10" step="0.5" value="1">
                    <span id="speedVal">1</span>
                </div>
                <div class="control-group">
                    <label>Trade Duration (seconds)</label>
                    <input type="number" id="tradeDuration" value="30" min="10" max="120" step="5">
                </div>
                <div class="control-group">
                    <label>Jump to Price</label>
                    <input type="number" id="jumpPrice" placeholder="Enter price">
                    <button onclick="jumpToPrice()">Jump</button>
                </div>
                <button class="btn-success" onclick="applySettings()">Apply All Settings</button>
            </div>

            <div class="card">
                <h3>💥 Market Events</h3>
                <button class="btn-danger" onclick="crash30()">💥 CRASH -30%</button>
                <button class="btn-success" onclick="pump50()">🚀 PUMP +50%</button>
                <button onclick="flashCrash()">⚡ Flash Crash -10%</button>
                <button onclick="miniPump()">✨ Mini Pump +15%</button>
            </div>

            <div class="card">
                <h3>💰 Give Domo Balance (Free USDT to User)</h3>
                <div class="control-group">
                    <label>Select User</label>
                    <select id="userSelect"></select>
                </div>
                <div class="control-group">
                    <label>Amount (USDT)</label>
                    <input type="number" id="domoAmount" value="1000">
                </div>
                <button class="btn-success" onclick="giveDomo()">🎁 Give Domo Balance</button>
            </div>

            <div class="card">
                <h3>👥 Registered Users & Stats</h3>
                <div id="userList"></div>
            </div>

            <div class="preview">
                <div class="preview-price" id="livePrice">$0.00</div>
                <div style="font-size: 12px; color: #8a92b0;">Live Market Preview</div>
                <canvas id="adminChart" width="800" height="200"></canvas>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJPWBRExcq3rjltVaRvc9-HwAn9iRlyRU",
            authDomain: "aviator-bappy.firebaseapp.com",
            databaseURL: "https://aviator-bappy-default-rtdb.firebaseio.com",
            projectId: "aviator-bappy",
            storageBucket: "aviator-bappy.firebasestorage.app",
            messagingSenderId: "380289888792",
            appId: "1:380289888792:web:afda6c3a33383d641f496d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADMIN_PASS = "admin123";
        let currentPrice = 100;
        let marketInterval = null;
        let chartData = [];

        function adminLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                startMarketSimulation();
                loadUsersList();
                startPriceListener();
                initAdminChart();
            } else {
                document.getElementById('loginErr').textContent = 'Wrong password';
            }
        }

        function adminLogout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            if (marketInterval) clearInterval(marketInterval);
        }

        function startPriceListener() {
            const marketRef = db.ref('binary/market');
            marketRef.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    currentPrice = data.price;
                    document.getElementById('adminPrice').textContent = `$${data.price.toFixed(2)}`;
                    document.getElementById('adminChange').textContent = `${data.change > 0 ? '+' : ''}${data.change.toFixed(2)}%`;
                    document.getElementById('adminStatus').textContent = data.isOpen ? 'OPEN' : 'CLOSED';
                    document.getElementById('livePrice').textContent = `$${data.price.toFixed(2)}`;
                    addAdminChartPoint(currentPrice);
                }
            });
            
            // Load settings
            db.ref('binary/settings').get().then((snap) => {
                const settings = snap.val() || {};
                document.getElementById('tradeDuration').value = settings.tradeDuration || 30;
            });
        }

        function loadUsersList() {
            const usersRaw = localStorage.getItem('binary_users');
            if (!usersRaw) {
                document.getElementById('userList').innerHTML = '<div style="text-align:center; padding:20px;">No users yet</div>';
                return;
            }
            const users = JSON.parse(usersRaw);
            const select = document.getElementById('userSelect');
            const listDiv = document.getElementById('userList');
            
            const usernames = Object.keys(users);
            select.innerHTML = '<option value="">Select User</option>' + usernames.map(u => `<option value="${u}">${u} - ${users[u].balance.toFixed(2)} USDT</option>`).join('');
            
            listDiv.innerHTML = usernames.map(u => {
                const totalTrades = users[u].history?.length || 0;
                const wins = users[u].history?.filter(h => h.result === 'win').length || 0;
                const winRate = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(1) : 0;
                const totalProfit = users[u].history?.filter(h => h.result === 'win').reduce((sum, h) => sum + (h.payout - h.amount), 0) || 0;
                return `
                    <div class="user-row">
                        <div><strong>${u}</strong><br><span style="font-size: 11px;">Balance: ${users[u].balance.toFixed(2)} USDT</span></div>
                        <div style="text-align: right;">
                            <div>Trades: ${totalTrades}</div>
                            <div style="color: #00c853;">Win Rate: ${winRate}%</div>
                            <div>Profit: ${totalProfit >= 0 ? '+' : ''}${totalProfit.toFixed(2)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function giveDomo() {
            const user = document.getElementById('userSelect').value;
            const amount = parseFloat(document.getElementById('domoAmount').value);
            if (!user || !amount || amount <= 0) {
                alert('Select user and enter valid amount');
                return;
            }
            const users = JSON.parse(localStorage.getItem('binary_users') || '{}');
            if (users[user]) {
                users[user].balance += amount;
                localStorage.setItem('binary_users', JSON.stringify(users));
                alert(`✅ ${amount} USDT added to ${user}`);
                loadUsersList();
            }
        }

        function startMarketSimulation() {
            if (marketInterval) clearInterval(marketInterval);
            
            marketInterval = setInterval(async () => {
                const snap = await db.ref('binary/market').get();
                const data = snap.val();
                if (data && data.isOpen) {
                    const direction = data.direction || 1;
                    const speed = data.speed || 1;
                    const move = (Math.random() * 0.3 + 0.05) * speed * direction;
                    let newPrice = currentPrice + move;
                    if (newPrice < 5) newPrice = 5;
                    if (newPrice > 50000) newPrice = 50000;
                    
                    const change = ((newPrice - currentPrice) / currentPrice) * 100;
                    
                    await db.ref('binary/market').update({
                        price: newPrice,
                        change: change,
                        lastUpdate: Date.now()
                    });
                    currentPrice = newPrice;
                }
            }, 100);
        }

        function applySettings() {
            const isOpen = document.getElementById('marketStatus').value === 'true';
            const direction = parseInt(document.getElementById('marketDir').value);
            const speed = parseFloat(document.getElementById('marketSpeed').value);
            const tradeDuration = parseInt(document.getElementById('tradeDuration').value);
            
            db.ref('binary/market').update({
                isOpen: isOpen,
                direction: direction,
                speed: speed
            });
            
            db.ref('binary/settings').update({
                tradeDuration: tradeDuration
            });
            
            alert('All settings applied!');
        }

        function jumpToPrice() {
            const newPrice = parseFloat(document.getElementById('jumpPrice').value);
            if (newPrice > 0) {
                const change = ((newPrice - currentPrice) / currentPrice) * 100;
                db.ref('binary/market').update({ price: newPrice, change: change });
            }
        }

        function crash30() {
            const newPrice = currentPrice * 0.7;
            const change = -30;
            db.ref('binary/market').update({ price: newPrice, change: change });
        }

        function pump50() {
            const newPrice = currentPrice * 1.5;
            const change = 50;
            db.ref('binary/market').update({ price: newPrice, change: change });
        }

        function flashCrash() {
            const newPrice = currentPrice * 0.9;
            const change = -10;
            db.ref('binary/market').update({ price: newPrice, change: change });
        }

        function miniPump() {
            const newPrice = currentPrice * 1.15;
            const change = 15;
            db.ref('binary/market').update({ price: newPrice, change: change });
        }

        // Admin Chart
        function initAdminChart() {
            for (let i = 0; i < 100; i++) chartData.push(100);
            drawAdminChart();
        }

        function addAdminChartPoint(price) {
            chartData.push(price);
            if (chartData.length > 100) chartData.shift();
            drawAdminChart();
        }

        function drawAdminChart() {
            const canvas = document.getElementById('adminChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            
            if (chartData.length < 2) return;
            const min = Math.min(...chartData);
            const max = Math.max(...chartData);
            const range = max - min || 1;
            
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = '#f0b90b';
            ctx.lineWidth = 2;
            
            const step = width / (chartData.length - 1);
            for (let i = 0; i < chartData.length; i++) {
                const x = i * step;
                const y = height - ((chartData[i] - min) / range) * (height - 40) - 20;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        document.getElementById('marketSpeed').oninput = function() {
            document.getElementById('speedVal').textContent = this.value;
        };
        
        setInterval(() => drawAdminChart(), 100);
        window.addEventListener('resize', () => drawAdminChart());
    </script>
</body>
</html>
